# CNB 构建流水线 — PhiInfo 方案
# 提取引擎: PhiInfo (C# + AssetsTools.NET) 替代 Python (UnityPy)
# 仓库: r-0semi/somnia-xtower → 产物: r-0semi/asset-xtower
main:
  web_trigger_build:
    - docker:
        image: mcr.microsoft.com/dotnet/sdk:10.0
      imports: https://cnb.cool/r-0semi/secrets-xtower/-/blob/main/env.yml
      runner:
        tags: cnb:arch:amd64
        cpus: 8
      stages:
        # 1. 安装工具 (python3 仅用于 translate/generate_index/phira, 都是纯标准库)
        - name: Install Tools
          script: |
            apt-get update -qq
            apt-get install -y -qq --no-install-recommends aria2 python3

        # 2. 克隆 PhiInfo 源码并编译
        - name: Build PhiInfo
          script: |
            git clone --depth=1 https://github.com/PhigrosLabs/PhiInfo.git /tmp/phiinfo
            dotnet build /tmp/phiinfo/src/PhiInfo.CLI -c Release

        # 2.5 如果未手动填写 APK 链接，从 TapTap 自动获取最新版本
        - name: Auto-detect from TapTap
          if: |
            [ -z "${APK_DOWNLOAD_URL:-}" ]
          script: |
            echo "未填写 APK 链接，从 TapTap 自动获取..."
            python3 taptap.py > /tmp/taptap.json
            cat /tmp/taptap.json
            # 提取值为环境变量（后续步骤使用）
            echo "##[set-output APK_DOWNLOAD_URL=$(python3 -c "import json,sys;print(json.load(open('/tmp/taptap.json')).get('download_url',''))")]"
            echo "##[set-output VERSION_NAME=$(python3 -c "import json,sys;print(json.load(open('/tmp/taptap.json')).get('version_name',''))")]"
            echo "##[set-output VERSION_CODE=$(python3 -c "import json,sys;print(json.load(open('/tmp/taptap.json')).get('version_code',''))")]"
          exports:
            APK_DOWNLOAD_URL: APK_DOWNLOAD_URL
            VERSION_NAME: VERSION_NAME
            VERSION_CODE: VERSION_CODE

        # 3. 下载 APK
        - name: Download APK
          script: |
            echo "Downloading: $APK_DOWNLOAD_URL"
            aria2c -x16 "$APK_DOWNLOAD_URL" -o game.apk

        # 4. PhiInfo 导出所有资源
        - name: PhiInfo Export
          script: dotnet /tmp/phiinfo/src/PhiInfo.CLI/bin/Release/net10.0/PhiInfo.CLI.dll -p game.apk --image-format PNG export -o output

        # 5. 翻译目录结构 + 生成 TSV (适配 generate_index 和 phira)
        - name: Translate Output
          script: python3 translate.py

        # 6. 生成网站索引
        - name: Generate Index
          script: python3 -c "import generate_index; generate_index.generate_site_resources()"

        # 7. 打包 Phira (.pez)
        - name: Package Phira
          script: python3 phira.py

        # 8. 推送产物到 asset-xtower (先清空旧文件防止 build residue)
        - name: Push to asset-xtower
          script: |
            git clone --depth=1 "https://cnb:${CNB_TOKEN}@cnb.cool/r-0semi/asset-xtower.git" /tmp/asset-repo
            rm -rf /tmp/asset-repo/chart /tmp/asset-repo/music /tmp/asset-repo/illustration /tmp/asset-repo/illustrationBlur /tmp/asset-repo/illustrationLowRes /tmp/asset-repo/avatar /tmp/asset-repo/info /tmp/asset-repo/phira
            cp -r output/* /tmp/asset-repo/
            cd /tmp/asset-repo
            git config user.name "r-0semi"
            git config user.email "sczr0710@163.com"
            git add -A
            git commit -m "Update assets" || echo "No changes to commit"
            git push
