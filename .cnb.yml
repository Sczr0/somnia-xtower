# CNB 构建流水线 — PhiInfo 方案
# 提取引擎: PhiInfo (C# + AssetsTools.NET) 替代 Python (UnityPy)
# 仓库: r-0semi/somnia-xtower → 产物: r-0semi/asset-xtower
main:
  web_trigger_build:
    - docker:
        image: mcr.microsoft.com/dotnet/sdk:10.0
      imports: https://cnb.cool/r-0semi/secrets-xtower/-/blob/main/env.yml
      runner:
        tags: cnb:arch:amd64
        cpus: 8
      stages:
        # 1. 安装工具 (python3 仅用于 translate/generate_index/phira, 都是纯标准库)
        - name: Install Tools
          script: |
            apt-get update -qq
            apt-get install -y -qq --no-install-recommends aria2 python3

        # 2. 下载 PhiInfo CLI 二进制 (预编译, 免装 .NET SDK)
        - name: Download PhiInfo
          script: |
            wget -q https://github.com/PhigrosLabs/PhiInfo/releases/latest/download/PhiInfo.CLI-linux-x64 -O /usr/local/bin/PhiInfo.CLI
            chmod +x /usr/local/bin/PhiInfo.CLI

        # 3. 下载 APK
        - name: Download APK
          script: aria2c -x16 "$APK_DOWNLOAD_URL" -o game.apk

        # 4. PhiInfo 导出所有资源 (--image-format PNG 保持与站点兼容)
        - name: PhiInfo Export
          script: PhiInfo.CLI -p game.apk --image-format PNG export -o output

        # 5. 翻译目录结构 + 生成 TSV (适配 generate_index 和 phira)
        - name: Translate Output
          script: python3 translate.py

        # 6. 生成网站索引
        - name: Generate Index
          script: python3 -c "import generate_index; generate_index.generate_site_resources()"

        # 7. 打包 Phira (.pez)
        - name: Package Phira
          script: python3 phira.py

        # 8. 推送产物到 asset-xtower
        - name: Push to asset-xtower
          script: |
            git clone --depth=1 "https://cnb:${CNB_TOKEN}@cnb.cool/r-0semi/asset-xtower.git" /tmp/asset-repo
            cp -r output/* /tmp/asset-repo/
            cd /tmp/asset-repo
            git config user.name "r-0semi"
            git config user.email "sczr0710@163.com"
            git add -A
            git commit -m "Update assets" || echo "No changes to commit"
            git push
