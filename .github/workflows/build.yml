name: Build and Deploy Phigros Assets

# 触发方式：
# 1. workflow_dispatch: 允许你在 GitHub 网页上手动点击运行，输入下载链接
# 2. repository_dispatch: 允许你的 Worker 通过 API 远程触发
on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: 'APK Download URL (Direct Link)'
        required: true
        type: string
      version_name:
        description: 'Version Name (Optional, manual trigger only)'
        required: false
        type: string
      version_code:
        description: 'Version Code (Optional, manual trigger only)'
        required: false
        type: string
  repository_dispatch:
    types: [new_phigros_version]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # 设置超时防止卡死，解包大文件通常耗时，给足 60 分钟
    timeout-minutes: 60
    
    permissions:
      contents: read
      deployments: write

    steps:
      # 1. 检出代码
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 安装系统级依赖
      # aria2: 下载神器
      # libvorbis/ogg: fsb5 音频解码需要（PhiInfo 用 Fmod5Sharp 不需要）
      - name: Install System Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2

      # 3. 配置 Python（仅用于 translate / phira / generate_index）
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 4. 安装 Python 库（仅需 Pillow）
      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      # 4.5 安装 .NET 10（PhiInfo.CLI 运行时）
      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      # 5. 下载 APK（由触发时传入链接）
      - name: Download APK
        env:
          APK_URL: ${{ inputs.apk_url || github.event.client_payload.download_url }}
        run: |
          aria2c -x16 "$APK_URL" -o game.apk

      # 5.5 PhiInfo 导出（WebP 格式，一次完成）
      - name: PhiInfo Export
        run: |
          dotnet PhiInfo.CLI/PhiInfo.CLI.dll \
            -p game.apk \
            --image-format Webp \
            export -o output

      # 5.6 翻译目录结构（asset/ → chart/ music/ illustration/ avatar/）
      - name: Translate Output Structure
        run: python3 translate.py

      # 5.7 生成缺失资产（PhiInfo 不输出的部分）
      - name: Generate Missing Assets
        run: |
          # illustrationLowRes: 从 illustration 降采样（Phira 需要 PNG）
          python3 << 'PYEOF'
import os
from PIL import Image
ill_dir = 'output/illustration'
low_dir = 'output/illustrationLowRes'
if os.path.isdir(ill_dir):
    os.makedirs(low_dir, exist_ok=True)
    for f in os.listdir(ill_dir):
        if not f.endswith('.webp'): continue
        song_id = f[:-5]
        img = Image.open(os.path.join(ill_dir, f))
        img.thumbnail((256, 256))
        img.save(os.path.join(low_dir, f'{song_id}.png'))
        print(f'  lowres: {song_id}.png')
PYEOF

          # lilith/ill: illustration 已经是 WebP，直接同步
          if [ -d output/illustration ]; then
            mkdir -p output/lilith/ill
            cp output/illustration/*.webp output/lilith/ill/ 2>/dev/null || true
            echo "lilith/ill: synced"
          fi

      # 5.8 打包 Phira (.pez)
      - name: Package Phira
        run: python3 phira.py

      # 5.9 生成版本文件（优先使用 PhiInfo 的 version.json，否则 fallback）
      - name: Generate Version File
        env:
          VERSION_NAME: ${{ inputs.version_name || github.event.client_payload.version_name }}
          VERSION_CODE: ${{ inputs.version_code || github.event.client_payload.version_code }}
          APK_DOWNLOAD_URL: ${{ inputs.apk_url || github.event.client_payload.download_url }}
        run: |
          mkdir -p output/info

          # 如果 PhiInfo 已经通过 version.json 生成好了 version.txt，就跳过
          if [ -f output/info/version.txt ]; then
            echo "version.txt already exists: $(cat output/info/version.txt)"
            exit 0
          fi

          if [ -n "${VERSION_NAME:-}" ] && [ -n "${VERSION_CODE:-}" ]; then
            VERSION_TEXT="${VERSION_NAME} (${VERSION_CODE})"
          elif [ -n "${VERSION_NAME:-}" ]; then
            VERSION_TEXT="${VERSION_NAME}"
          elif [ -n "${VERSION_CODE:-}" ]; then
            VERSION_TEXT="${VERSION_CODE}"
          else
            VERSION_TEXT="$(printf '%s\n' "${APK_DOWNLOAD_URL:-}" | sed -nE 's/.*([0-9]+\.[0-9]+(\.[0-9]+)?).*/\1/p' | head -n 1)"
            if [ -z "${VERSION_TEXT:-}" ]; then
              VERSION_TEXT="unknown"
            fi
          fi

          printf '%s\n' "${VERSION_TEXT}" > output/info/version.txt
          echo "Generated output/info/version.txt => ${VERSION_TEXT}"

      # 5.10 最终生成索引（files.json + _redirects + checksums.sha256）
      - name: Generate Final Index
        run: |
          python -c "import generate_index; generate_index.generate_site_resources()"

      # 6. 部署到 Cloudflare Pages
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./output --project-name=somnia-asset --commit-dirty=true